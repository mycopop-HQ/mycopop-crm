<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mycopop — Get in touch</title>
<meta name="description" content="Carry Mycopop at your shop, or join the field team. Tell us a little about you.">
<meta name="theme-color" content="#241B22">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--blush:#FBF4F0;--blush-2:#F5E9E2;--ink:#241B22;--ink-2:#6A5A60;--line:#E7D6CC;--saffron:#E0922B;--saffron-d:#C47A18;--berry:#D6435A;--berry-d:#B63249;--myc:#5F8A6B;--myc-d:#4A7256;--card:#FFFFFF;--shadow:0 1px 2px rgba(36,27,34,.04),0 10px 30px rgba(36,27,34,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--blush);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;padding:32px 18px}
  .wrap{max-width:560px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:22px}
  .brand b{font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;letter-spacing:-.02em}
  .brand small{display:block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--saffron-d);font-weight:700}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:30px}
  h1{font-family:'Bricolage Grotesque';font-weight:800;font-size:27px;letter-spacing:-.02em;line-height:1.08}
  .lede{color:var(--ink-2);font-size:14.5px;margin:8px 0 22px}
  .seg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
  .seg button{border:1px solid var(--line);background:var(--blush);color:var(--ink-2);padding:13px;border-radius:11px;font:inherit;font-weight:600;font-size:14px;cursor:pointer;transition:.12s}
  .seg button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  label{display:block;font-size:12.5px;color:var(--ink-2);font-weight:600;margin:13px 0 5px}
  input,textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:11px 12px;font:inherit;font-size:15px;background:var(--card);color:var(--ink)}
  input:focus,textarea:focus{outline:0;border-color:var(--saffron);box-shadow:0 0 0 3px rgba(224,146,43,.15)}
  textarea{min-height:88px;resize:vertical}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .hp{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}
  .submit{width:100%;margin-top:22px;background:var(--berry);color:#fff;border:0;border-radius:11px;padding:14px;font:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:.12s}
  .submit:hover{background:var(--berry-d)}
  .submit:disabled{opacity:.6;cursor:default}
  .msg{margin-top:14px;font-size:13.5px;min-height:1.1em;text-align:center}
  .foot{text-align:center;color:var(--ink-2);font-size:11.5px;margin-top:18px}
  .done{text-align:center;padding:18px 0}
  .done .big{font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;margin-bottom:6px}
  @media(max-width:480px){.row{grid-template-columns:1fr}.card{padding:22px}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <svg width="34" height="34" viewBox="0 0 40 40" fill="none"><path d="M20 5C12 5 6 11 6 18c0 2 1 3 3 3h22c2 0 3-1 3-3 0-7-6-13-14-13z" fill="#E0922B"/><circle cx="14" cy="15" r="2" fill="#FBF4F0"/><circle cx="24" cy="13" r="2.4" fill="#FBF4F0"/><path d="M16 21h8l-1 11c0 2-2 3-3 3s-3-1-3-3l-1-11z" fill="#D6435A"/></svg>
      <div><b>Mycopop</b><small>Hibiscus · Ginger · Lemon</small></div>
    </div>
    <div class="card" id="card">
      <h1>Let's talk Mycopop</h1>
      <p class="lede">Want to carry Mycopop at your shop, or rep it in the field? Tell us a little about you and we'll reach out.</p>
      <form id="form">
        <div class="seg" id="seg">
          <button type="button" data-i="wholesale" class="on">🛒 Carry Mycopop (wholesale)</button>
          <button type="button" data-i="ambassador">🌱 Become an ambassador</button>
        </div>
        <div class="row">
          <div><label>Name *</label><input id="name" required></div>
          <div><label>Email *</label><input id="email" type="email" required></div>
        </div>
        <div class="row">
          <div><label>Phone</label><input id="phone" type="tel"></div>
          <div><label>City / area</label><input id="location" placeholder="e.g. Nashville, TN"></div>
        </div>
        <div class="row">
          <div><label>Instagram</label><input id="instagram" placeholder="@handle"></div>
          <div><label>TikTok</label><input id="tiktok" placeholder="@handle"></div>
        </div>
        <label>Website (shop or social)</label><input id="website" placeholder="https://">
        <label>Anything else?</label><textarea id="message" placeholder="Your shop, your audience, how you'd sell it…"></textarea>
        <input class="hp" id="company" tabindex="-1" autocomplete="off" aria-hidden="true" placeholder="Company">
        <button type="submit" class="submit" id="submit">Send it</button>
        <p class="msg" id="msg"></p>
      </form>
    </div>
    <p class="foot">Mycopop · powered by Fungus Ranch</p>
  </div>

<script>
  const ENDPOINT = "https://submitinquiry-edigoxxmza-uc.a.run.app";
  let interest = "wholesale";
  const $ = (id) => document.getElementById(id);
  $("seg").addEventListener("click", (e) => {
    const b = e.target.closest("button[data-i]"); if (!b) return;
    interest = b.dataset.i;
    [...$("seg").children].forEach(x => x.classList.toggle("on", x === b));
  });
  $("form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msg = $("msg"); msg.style.color = "#6A5A60";
    const name = $("name").value.trim(), email = $("email").value.trim();
    if (!name || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { msg.style.color = "#B63249"; msg.textContent = "Please add your name and a valid email."; return; }
    $("submit").disabled = true; $("submit").textContent = "Sending…"; msg.textContent = "";
    try {
      const r = await fetch(ENDPOINT, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          interest, name, email,
          phone: $("phone").value.trim(), location: $("location").value.trim(),
          instagram: $("instagram").value.trim(), tiktok: $("tiktok").value.trim(),
          website: $("website").value.trim(), message: $("message").value.trim(),
          company: $("company").value,
        }),
      });
      const j = await r.json().catch(() => ({}));
      if (!r.ok || !j.ok) throw new Error(j.error || "Something went wrong. Please try again.");
      $("card").innerHTML = `<div class="done"><div class="big">Thanks, ${name.split(" ")[0]}! 🍄</div><p class="lede">We got it — someone from Mycopop will reach out soon. Keep an eye on your inbox.</p></div>`;
    } catch (err) {
      $("submit").disabled = false; $("submit").textContent = "Send it";
      msg.style.color = "#B63249"; msg.textContent = err.message;
    }
  });
</script>
</body>
</html>
